name: Tests

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run tests
        env:
          # Dummy values — real secrets are not needed; tests use mocks + SQLite
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          GOOGLE_REDIRECT_URI: http://localhost/auth/callback
          OPENAI_API_KEY: test-openai-key
          DATABASE_URL: "sqlite:///:memory:"
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: '{"type":"service_account","project_id":"test"}'
          AGENCY_SECRET_KEY: test-secret
        run: PYTHONPATH=. pytest -q --tb=short
