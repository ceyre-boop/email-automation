name: Export .env

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Create backend/.env from secrets
        run: |
          mkdir -p backend
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" > backend/.env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> backend/.env
          echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> backend/.env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> backend/.env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> backend/.env
          echo "GOOGLE_SHEETS_REFRESH_TOKEN=${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}" >> backend/.env
          echo "APP_BASE_URL=${{ secrets.APP_BASE_URL }}" >> backend/.env
          echo "AGENCY_SECRET_KEY=${{ secrets.AGENCY_SECRET_KEY }}" >> backend/.env
          echo "API_KEY=${{ secrets.API_KEY }}" >> backend/.env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> backend/.env
          echo "POLL_INTERVAL_MINUTES=5" >> backend/.env
          echo "Lines written: $(wc -l < backend/.env)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: backend/.env
          retention-days: 1
          include-hidden-files: true
