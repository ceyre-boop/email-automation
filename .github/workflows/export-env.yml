name: Export .env

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create .env file from GitHub Secrets
        run: |
          mkdir -p backend
          {
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}";
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}";
            echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}";
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}";
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}";
            echo "GOOGLE_SHEETS_REFRESH_TOKEN=${{ secrets.GOOGLE_SHEETS_REFRESH_TOKEN }}";
            echo "APP_BASE_URL=${{ secrets.APP_BASE_URL }}";
            echo "AGENCY_SECRET_KEY=${{ secrets.AGENCY_SECRET_KEY }}";
            echo "API_KEY=${{ secrets.API_KEY }}";
            echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}";
          } > backend/.env

      - name: Upload .env as artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: backend/.env
          retention-days: 1
