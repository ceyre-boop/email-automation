<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TABOOST — Talent Inbox Automation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080b14;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      color: #e2e8f0;
    }

    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.3;
      animation: orb-drift 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 520px; height: 520px; background: #7c3aed; top: -140px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 420px; height: 420px; background: #1d4ed8; bottom: -100px; right: -100px; animation-delay: -7s; }
    .orb-3 { width: 320px; height: 320px; background: #be185d; top: 45%; left: 58%; animation-delay: -14s; }

    @keyframes orb-drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(30px, 20px); }
    }

    .glass-card {
      position: relative; z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 440px;
      width: calc(100% - 32px);
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 40px 80px rgba(0, 0, 0, 0.65);
    }

    .brand { margin-bottom: 28px; }
    .brand-logo {
      display: block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.24em;
      color: #a78bfa;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .brand-tag {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .genie-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 32px;
    }
    .genie-wrapper img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.45), 0 12px 40px rgba(0,0,0,0.5);
    }
    .genie-glow {
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.6) 0%, transparent 68%);
      animation: pulse-glow 4s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%       { opacity: 0.9;  transform: scale(1.14); }
    }

    .copy { margin-bottom: 32px; }
    h1 {
      font-size: 34px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1.15;
      margin-bottom: 10px;
      letter-spacing: -0.03em;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.4);
      line-height: 1.5;
    }

    /* State A — talent known */
    .talent-pill {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: rgba(167, 139, 250, 0.10);
      border: 1px solid rgba(167, 139, 250, 0.28);
      border-radius: 16px;
      padding: 12px 32px;
      margin-bottom: 20px;
      width: 100%;
    }
    .pill-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 3px;
    }
    .pill-name {
      font-size: 20px;
      font-weight: 700;
      color: #f8fafc;
    }

    /* State B — access code form */
    #code-form { text-align: left; }
    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      color: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 8px;
      -webkit-appearance: none;
    }
    input[type="text"]:focus {
      border-color: rgba(167, 139, 250, 0.65);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.22);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.18); }
    .field-error {
      font-size: 13px;
      color: #f87171;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* Google button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      background: #ffffff;
      color: #3c4043;
      font-size: 15px;
      font-weight: 500;
      font-family: 'Roboto', -apple-system, sans-serif;
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 14px 24px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 12px;
      letter-spacing: 0.01em;
    }
    .btn-google:hover {
      background: #f8f9fa;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); box-shadow: none; }
    button.btn-google { border: 1px solid #dadce0; }

    .fine-print {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-top: 22px;
      line-height: 1.7;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="glass-card">
    <header class="brand">
      <span class="brand-logo">TABOOST</span>
      <span class="brand-tag">Talent Inbox Automation</span>
    </header>

    <div class="genie-wrapper">
      <div class="genie-glow"></div>
      <img id="genie-img" alt="TABOOST Genie" />
    </div>

    <div class="copy">
      <h1>Your inbox,<br/>handled.</h1>
      <p class="subtitle">Connect once. We handle the rest.</p>
    </div>

    <!-- State A: talent key in URL -->
    <div id="state-known" class="hidden">
      <div class="talent-pill">
        <span class="pill-label">Connecting for</span>
        <span id="talent-display" class="pill-name">…</span>
      </div>
      <a id="btn-known" class="btn-google" href="#">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
      </a>
    </div>

    <!-- State B: no talent key — show access code input -->
    <div id="state-unknown" class="hidden">
      <form id="code-form" novalidate>
        <label class="input-label" for="access-code">Your Access Code</label>
        <input id="access-code" type="text" placeholder="e.g. katrina" autocomplete="off" spellcheck="false" />
        <p id="code-error" class="field-error hidden">Code not recognised — check with your manager.</p>
        <button type="submit" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>
      </form>
    </div>

    <p class="fine-print">Google handles your password — we only see your inbox.</p>
  </main>

    (function () {
      var params    = new URLSearchParams(window.location.search);
      var talentKey = (params.get('talent') || '').trim();
      var stateKnown   = document.getElementById('state-known');
      var stateUnknown = document.getElementById('state-unknown');

      if (talentKey) {
        stateKnown.classList.remove('hidden');
        document.getElementById('talent-display').textContent = talentKey;
        document.getElementById('btn-known').href =
          '/auth/connect?talent_key=' + encodeURIComponent(talentKey);

      } else {
        stateUnknown.classList.remove('hidden');
        document.getElementById('code-form').addEventListener('submit', function(e) {
          e.preventDefault();
          var code = document.getElementById('access-code').value.trim();
          if (!code) return;
          window.location.href = '/auth/connect?talent_key=' + encodeURIComponent(code);
        });
      }
    })();
  </script>
